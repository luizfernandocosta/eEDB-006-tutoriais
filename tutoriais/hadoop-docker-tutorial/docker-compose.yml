services:
  hadoop:
    build:
      context: .
      dockerfile: Dockerfile
    image: hadoop-single-node:3.3.6
    container_name: hadoop
    hostname: myhdfs
    ports:
      - "9870:9870"
      - "8088:8088"
      - "9000:9000"
      - "9864:9864"
    environment:
      - YARNSTART=1
    volumes:
      - hadoop-data:/tmp/hadoop-hduser
    stdin_open: true
    tty: true

volumes:
  hadoop-data:
